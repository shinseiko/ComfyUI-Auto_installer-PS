# ComfyUI Auto_installer PS Workflow Add Ecc Bundle Component

## Action

Follow the add-ecc-bundle-component workflow:
1. Create or update .claude/ecc-tools.json to register the tool
2. Add SKILL.md in .claude/skills/<SkillName>/ and/or .agents/skills/<SkillName>/
3. Add agent configuration (e.g., openai.yaml) in .agents/skills/<SkillName>/agents/
4. Add or update .claude/identity.json
5. Create or update .codex/config.toml and .codex/AGENTS.md
6. Add agent TOML files in .codex/agents/
7. Add instincts YAML in .claude/homunculus/instincts/inherited/
8. Add or update command documentation in .claude/commands/

## Evidence

- Workflow detected from commit patterns
- Frequency: ~1x per month
- Files: .claude/ecc-tools.json, .claude/skills/*/SKILL.md, .agents/skills/*/SKILL.md

